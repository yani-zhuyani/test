<h2>走查的粒度是？</h2>
<p class="subtitle">每次走查的范围通常是哪个级别？</p>

<div class="section">
  <div class="options">
    <div class="option" data-choice="page" onclick="toggleSelect(this)">
      <div class="letter">A</div>
      <div class="content">
        <h3>整页截图对比</h3>
        <p>设计师截整页 or 某个视口区域，和 Figma 对应 Frame 做整体对比</p>
      </div>
    </div>
    <div class="option" data-choice="component" onclick="toggleSelect(this)">
      <div class="letter">B</div>
      <div class="content">
        <h3>组件级对比</h3>
        <p>针对具体组件（按钮、表单、卡片等）逐一走查还原精度</p>
      </div>
    </div>
    <div class="option" data-choice="both" onclick="toggleSelect(this)">
      <div class="letter">C</div>
      <div class="content">
        <h3>两者都要</h3>
        <p>先整页扫一遍，再下钻到有问题的组件做精确对比</p>
      </div>
    </div>
  </div>
</div>
